server:
  frontUrl: ${FRONT_URL}
  backUrl: ${BACK_URL}
  port: 443
  error:
    whitelabel:
      enabled: false  # 기본 whitelabel 에러 페이지 비활성화
    path: /error
  ssl:
    enabled: true
    key-store: ${SERVER_SSL_KEY_STORE}
    key-store-type: "PKCS12"
    key-store-password: ${KEY_STORE_PASSWORD}

jdbc:
  datasource:
    proxy:
      logging: true

portone:
  portone_secret: ${PORTONE_SECRET}
gemini:
  api:
    key: ${GEMINI_API}
jwt:
  secret: ${JWT_SECRET}
  expire: ${JWT_EXPIRE}

project:
  upload:
    path: ${UPLOAD_PATH}
  aes:
    key: ${AES_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    #    enabled: false
    sampling:
      probability: 1.0   # 모든 요청에 대한 데이터를 수집하겠다.
  otlp:
    tracing:
      endpoint: ${JAEGER_URL}
      transport: http



spring:
  servlet:
    multipart:
      max-file-size: 10MB      # 파일 1개당 최대 크기
      max-request-size: 50MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_ADDR}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
            required: true
          auth: true
          timeout: 5000
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      s3:
        bucket: ${AWS_BUCKET_NAME}
      region:
        static: ap-northeast-2
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri : ${GOOGLE_REDIRECT_URI}
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-name: kakao
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            scope: profile_nickname
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  application:
    name: porti
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      initialization-fail-timeout: 120000 # 120초 동안은 실패해도 포기하지 않고 재시도
      connection-timeout: 15000 # 15초마다 재시도, 총 4회까지 연결 시도

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.example: debug
    net.ttddyy.observation: DEBUG